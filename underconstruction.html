    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <!-- Fonts & Favicon -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="dist/img/logo/Logo H Black.svg" />

    <!-- Tailwind Config (same palette & tokens as your main page) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#212121",
              background: "#FFFFFF",
              text: "#212121",
              secondary: "#616161",
              footer: "#ACACAC",
              border: "#E0E0E0",
              card: "#F5F5F5",
            },
            fontFamily: {
              display: ["Plus Jakarta Sans", "ui-sans-serif", "system-ui", "sans-serif"],
            },
            borderRadius: { lg: "1rem" },
            keyframes: {
              bgShift: {
                "0%": { backgroundPosition: "0% 50%" },
                "50%": { backgroundPosition: "100% 50%" },
                "100%": { backgroundPosition: "0% 50%" },
              },
            },
            animation: { "bg-shift": "bgShift 3s ease infinite" },
          },
        },
      };
    </script>

    <!-- Utilities -->
    <style type="text/tailwindcss">
      @layer utilities {
        .container-page {
          @apply container mx-auto max-w-6xl px-4;
        }

        /* Reusable button gradient (same as index) */
        .btn {
          @apply relative inline-flex items-center justify-center rounded-full px-8 py-3 font-medium text-white bg-black overflow-hidden;
        }
        .btn::before {
          content: "";
          background-image: linear-gradient(to right, #1f1e5c, #e73429);
          @apply absolute inset-0 opacity-0 transition-opacity duration-500 bg-[length:200%_200%];
        }
        .btn:hover::before {
          @apply opacity-100 animate-bg-shift;
        }
        .btn > span {
          @apply relative z-10;
        }
      }
    </style>
  </head>
